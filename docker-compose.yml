services:
  web:
    image: nginx:alpine
    container_name: SAL_LIB_WEB
    user: "0:0"
    ports:
      - "18115:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - ./apps/frontend/dist:/usr/share/nginx/html
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: SAL_LIB_DB
    restart: unless-stopped
    ports:
      - "3345:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: salahuddin_library
    volumes:
      - sal_lib_db_data:/var/lib/mysql

volumes:
  sal_lib_db_data:
